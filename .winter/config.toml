# ---------------------------------------------------------------------------
# Standalone repositories — winter extensions, cloned once under .winter/ext/.
# The winter-* extensions are the same repos that serve the winter workspace.
# blizzard-harness is additionally installed as an extension so its conventions
# load into every agent context (it also appears as a project repo above, for
# editing through the feature-environment flow).
# ---------------------------------------------------------------------------

[[standalone_repository]]
name = "winter-canon"
url = "git@github.com:paul-gross/winter-canon.git"
path = ".winter/ext/canon"

[[standalone_repository]]
